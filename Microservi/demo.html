<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Model Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111621;
            --bg-tertiary: #161b2e;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-secondary: #06b6d4;
            --accent-tertiary: #8b5cf6;
            --border: #1e293b;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
            letter-spacing: -0.8px;
        }

        .header p {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Main Content */
        .main {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .form-section h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 32px;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 26px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
            letter-spacing: 0.2px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.25s ease;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-secondary);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--bg-tertiary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 26px;
        }

        /* Button */
        button {
            width: 100%;
            padding: 13px 28px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 22px;
            letter-spacing: 0.2px;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25);
        }

        button:hover:not(:disabled) {
            background: var(--accent-secondary);
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.35);
            transform: translateY(-2px);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* Results */
        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .results-header {
            margin-bottom: 36px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .results-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .results-meta {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .results-meta strong {
            color: var(--accent-primary);
        }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 20px;
            margin-bottom: 36px;
        }

        .model-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 26px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .model-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.25s ease;
        }

        .model-card:hover {
            border-color: var(--accent-primary);
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, rgba(59, 130, 246, 0.05) 100%);
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.15);
        }

        .model-card:hover::before {
            transform: scaleX(1);
        }

        .rank-badge {
            display: inline-block;
            background: var(--accent-primary);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 0.4px;
        }

        .model-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }

        .model-provider {
            font-size: 0.85rem;
            color: var(--accent-primary);
            margin-bottom: 16px;
            font-weight: 500;
        }

        .model-score {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-primary);
            margin: 18px 0;
            text-align: center;
            padding: 14px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .metrics {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 0.9rem;
        }

        .metric-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .metric-value {
            color: var(--accent-secondary);
            font-weight: 700;
            font-size: 1rem;
        }

        .strengths {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }

        .strengths-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 9px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .strengths ul {
            list-style: none;
        }

        .strengths li {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
            padding-left: 14px;
            position: relative;
            transition: color 0.2s ease;
        }

        .strengths li:hover {
            color: var(--accent-primary);
        }

        .strengths li:before {
            content: "•";
            position: absolute;
            left: 4px;
            color: var(--accent-primary);
            font-weight: bold;
        }

        /* Reset Button */
        .btn-reset {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            margin-top: 28px;
            display: inline-block;
            width: auto;
            padding: 10px 28px;
            box-shadow: none;
        }

        .btn-reset:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 32px 20px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Error */
        .error-message {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 18px;
            font-size: 0.9rem;
            display: none;
            font-weight: 500;
        }

        .error-message.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .main {
                padding: 28px;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                gap: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>AI Model Recommender</h1>
            <p>Find the right AI model for your specific requirements and budget</p>
        </header>

        <main class="main">
            <form id="requirementForm" class="form-section">
                <h2>Project Requirements</h2>

                <div class="form-group">
                    <label for="useCase">Describe your project</label>
                    <textarea
                        id="useCase"
                        placeholder="What are you building? E.g., customer support chatbot, content generation, data analysis..."
                        rows="3"
                        required
                    ></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="budget">Budget range</label>
                        <select id="budget" name="budget">
                            <option value="free">Free (under $10/month)</option>
                            <option value="low">Low ($10–50/month)</option>
                            <option value="medium" selected>Medium ($50–500/month)</option>
                            <option value="high">High ($500+/month)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="priority1">Primary priority</label>
                        <select id="priority1" name="priority1">
                            <option value="accuracy" selected>Accuracy</option>
                            <option value="cost">Cost efficiency</option>
                            <option value="speed">Speed</option>
                            <option value="balanced">Balanced</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="priority2">Secondary priority</label>
                        <select id="priority2" name="priority2">
                            <option value="cost" selected>Cost efficiency</option>
                            <option value="accuracy">Accuracy</option>
                            <option value="speed">Speed</option>
                            <option value="balanced">Balanced</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="monthlyUsage">Expected monthly volume</label>
                        <select id="monthlyUsage" name="monthlyUsage">
                            <option value="low" selected>Low (under 1M tokens)</option>
                            <option value="medium">Medium (1M–10M tokens)</option>
                            <option value="high">High (10M–100M tokens)</option>
                            <option value="very-high">Very high (100M+ tokens)</option>
                        </select>
                    </div>
                </div>

                <button type="submit">Get Recommendations</button>
            </form>

            <div id="results" class="results">
                <div class="results-header">
                    <h2>Top recommendations</h2>
                    <div class="results-meta" id="resultsSubtitle"></div>
                </div>
                <div id="resultsGrid" class="results-grid"></div>
                <button class="btn-reset" onclick="resetForm()">New search</button>
            </div>

            <div id="errorMessage" class="error-message"></div>
        </main>

        <footer class="footer">
            <p>AI-powered model recommendations based on your requirements</p>
        </footer>
    </div>

    <script>
        const MODELS = [
            {
                id: "claude-opus-4",
                name: "Claude 3.5 Opus",
                provider: "Anthropic",
                costPerMTok: 15.0,
                speed: 9,
                accuracy: 10,
                contextWindow: 200000,
                strengths: ["Advanced reasoning", "Complex problem-solving", "Extended context"]
            },
            {
                id: "gpt-4o",
                name: "GPT-4o",
                provider: "OpenAI",
                costPerMTok: 30.0,
                speed: 8,
                accuracy: 9,
                contextWindow: 128000,
                strengths: ["Multimodal capabilities", "Industry standard", "Proven reliability"]
            },
            {
                id: "claude-sonnet",
                name: "Claude 3.5 Sonnet",
                provider: "Anthropic",
                costPerMTok: 3.0,
                speed: 8,
                accuracy: 9,
                contextWindow: 200000,
                strengths: ["Optimal value", "Fast inference", "High quality output"]
            },
            {
                id: "claude-haiku",
                name: "Claude 3.5 Haiku",
                provider: "Anthropic",
                costPerMTok: 0.8,
                speed: 9,
                accuracy: 7,
                contextWindow: 200000,
                strengths: ["Minimal latency", "Cost-effective", "Real-time capable"]
            },
            {
                id: "gpt-3.5-turbo",
                name: "GPT-3.5 Turbo",
                provider: "OpenAI",
                costPerMTok: 0.5,
                speed: 9,
                accuracy: 6,
                contextWindow: 16000,
                strengths: ["Lowest cost", "Fast response", "Stable performance"]
            },
            {
                id: "gemini-pro",
                name: "Gemini Pro",
                provider: "Google",
                costPerMTok: 7.5,
                speed: 8,
                accuracy: 8,
                contextWindow: 1000000,
                strengths: ["Long context window", "Strong performance", "Value pricing"]
            },
            {
                id: "gemini-flash",
                name: "Gemini Flash",
                provider: "Google",
                costPerMTok: 0.075,
                speed: 9,
                accuracy: 7,
                contextWindow: 1000000,
                strengths: ["Ultra-affordable", "High throughput", "Massive capacity"]
            },
            {
                id: "mistral-large",
                name: "Mistral Large",
                provider: "Mistral",
                costPerMTok: 8.0,
                speed: 8,
                accuracy: 8,
                contextWindow: 32000,
                strengths: ["Enterprise-grade", "Strong reasoning", "Balanced performance"]
            },
            {
                id: "llama-2-70b",
                name: "Llama 2 70B",
                provider: "Meta",
                costPerMTok: 0.27,
                speed: 6,
                accuracy: 7,
                contextWindow: 4096,
                strengths: ["Open source", "Self-hosting option", "No vendor dependency"]
            },
            {
                id: "gpt-4-turbo",
                name: "GPT-4 Turbo",
                provider: "OpenAI",
                costPerMTok: 10.0,
                speed: 7,
                accuracy: 9,
                contextWindow: 128000,
                strengths: ["Advanced reasoning", "Highly stable", "Well-documented"]
            }
        ];

        document.getElementById('requirementForm').addEventListener('submit', function(e) {
            e.preventDefault();
            rankModels();
        });

        function rankModels() {
            const useCase = document.getElementById('useCase').value.trim();
            const budget = document.getElementById('budget').value;
            const priority1 = document.getElementById('priority1').value;
            const priority2 = document.getElementById('priority2').value;
            const monthlyUsage = document.getElementById('monthlyUsage').value;

            if (!useCase) {
                showError('Please describe your project');
                return;
            }

            const scoredModels = MODELS.map(model => {
                let score = 5;

                let budgetMultiplier = 1;
                if (budget === 'free' && model.costPerMTok < 1) budgetMultiplier = 2;
                else if (budget === 'low' && model.costPerMTok < 5) budgetMultiplier = 1.8;
                else if (budget === 'medium' && model.costPerMTok < 15) budgetMultiplier = 1.5;
                else if (budget === 'high') budgetMultiplier = 1.2;

                score += (10 - Math.min(10, model.costPerMTok / 2)) * 0.15 * budgetMultiplier;

                const priorityWeights = {
                    accuracy: model.accuracy / 10,
                    speed: model.speed / 10,
                    cost: (10 - Math.min(10, model.costPerMTok / 2)) / 10,
                    balanced: (model.accuracy + model.speed) / 20,
                };

                score += priorityWeights[priority1] * 4;
                score += priorityWeights[priority2] * 2;

                const monthlyTokens = {
                    'low': 1000000,
                    'medium': 50000000,
                    'high': 500000000,
                    'very-high': 1000000000,
                };

                const tokens = monthlyTokens[monthlyUsage] || 1000000;
                const estimatedCost = (tokens / 1000000) * model.costPerMTok;

                if (estimatedCost < 100 && monthlyUsage !== 'low') score += 1;

                return {
                    ...model,
                    score: Math.min(10, Math.max(1, score)),
                    estimatedCost,
                };
            });

            const rankedModels = scoredModels.sort((a, b) => b.score - a.score).slice(0, 10);
            displayResults(rankedModels, useCase, budget);
            clearError();
        }

        function displayResults(rankedModels, useCase, budget) {
            document.getElementById('requirementForm').style.display = 'none';
            document.getElementById('results').classList.add('active');

            const shortUseCase = useCase.substring(0, 45) + (useCase.length > 45 ? '...' : '');
            document.getElementById('resultsSubtitle').innerHTML =
                `Project: <strong>${shortUseCase}</strong> • Budget: <strong>${budget}</strong>`;

            const resultsGrid = document.getElementById('resultsGrid');
            resultsGrid.innerHTML = '';

            rankedModels.forEach((model, index) => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.innerHTML = `
                    <span class="rank-badge">#${index + 1}</span>
                    <div class="model-name">${model.name}</div>
                    <div class="model-provider">${model.provider}</div>
                    <div class="model-score">${model.score.toFixed(1)}</div>
                    <div class="metrics">
                        <div class="metric">
                            <span class="metric-label">Monthly cost</span>
                            <span class="metric-value">$${model.estimatedCost.toFixed(2)}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Speed</span>
                            <span class="metric-value">${model.speed}/10</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Accuracy</span>
                            <span class="metric-value">${model.accuracy}/10</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Context</span>
                            <span class="metric-value">${(model.contextWindow / 1000).toFixed(0)}K tokens</span>
                        </div>
                    </div>
                    <div class="strengths">
                        <div class="strengths-title">Key strengths</div>
                        <ul>
                            ${model.strengths.map(s => `<li>${s}</li>`).join('')}
                        </ul>
                    </div>
                `;
                resultsGrid.appendChild(card);
            });

            document.querySelector('.results-header').scrollIntoView({ behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('requirementForm').reset();
            document.getElementById('results').classList.remove('active');
            document.getElementById('requirementForm').style.display = 'block';
            clearError();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('active');
        }

        function clearError() {
            document.getElementById('errorMessage').classList.remove('active');
        }
    </script>
</body>
</html>
